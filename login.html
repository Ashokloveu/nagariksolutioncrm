<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nagarik Solution CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #0f5b3e, #1b8c5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ecf0f1;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #1b8c5e;
            box-shadow: 0 0 0 4px rgba(27,140,94,0.1);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0f5b3e, #1b8c5e);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(27,140,94,0.3);
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
        }
        .auth-footer a {
            color: #1b8c5e;
            text-decoration: none;
            font-weight: 600;
        }
        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .message.error {
            background: #fee;
            color: #c33;
            display: block;
        }
        .message.success {
            background: #efe;
            color: #3a6;
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1><i class="fas fa-chart-line"></i> Nagarik Solution</h1>
                <p>Enterprise CRM Suite · Secure Access</p>
            </div>
            <div id="message" class="message"></div>
            <form id="loginForm">
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="auth-btn">Login to Dashboard</button>
            </form>
            <div class="auth-footer">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </div>

    <script>
        const USERS_KEY = 'nagarik_crm_users';
        
        // Initialize default users if not exists
        if (!localStorage.getItem(USERS_KEY)) {
            const defaultUsers = [
                { id: "1", fullName: "Administrator", email: "admin@nagarik.com", password: "admin123", role: "admin", status: "active", createdAt: new Date().toISOString() },
                { id: "2", fullName: "Manager User", email: "manager@nagarik.com", password: "manager123", role: "manager", status: "active", createdAt: new Date().toISOString() },
                { id: "3", fullName: "Team Member", email: "user@nagarik.com", password: "user123", role: "user", status: "active", createdAt: new Date().toISOString() }
            ];
            localStorage.setItem(USERS_KEY, JSON.stringify(defaultUsers));
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const users = JSON.parse(localStorage.getItem(USERS_KEY));
            const user = users.find(u => u.email === email && u.password === password && u.status === 'active');
            
            if (user) {
                sessionStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = 'index.html';
            } else {
                const msgDiv = document.getElementById('message');
                msgDiv.className = 'message error';
                msgDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid email or password!';
                setTimeout(() => msgDiv.className = 'message', 3000);
            }
        });
    </script>
</body>
</html>
