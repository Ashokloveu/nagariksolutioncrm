<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Nagarik Solution CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #0f5b3e, #1b8c5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group.full-width {
            grid-column: span 2;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ecf0f1;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #1b8c5e;
            box-shadow: 0 0 0 4px rgba(27,140,94,0.1);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0f5b3e, #1b8c5e);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(27,140,94,0.3);
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
        }
        .auth-footer a {
            color: #1b8c5e;
            text-decoration: none;
            font-weight: 600;
        }
        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .message.error {
            background: #fee;
            color: #c33;
            display: block;
        }
        .message.success {
            background: #efe;
            color: #3a6;
            display: block;
        }
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .input-group.full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1><i class="fas fa-user-plus"></i> Create Account</h1>
                <p>Join Nagarik Solution CRM</p>
            </div>
            <div id="message" class="message"></div>
            <form id="registerForm">
                <div class="form-grid">
                    <div class="input-group full-width">
                        <label><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter your full name" required>
                    </div>
                    <div class="input-group full-width">
                        <label><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-briefcase"></i> Role</label>
                        <select id="role">
                            <option value="user">Team Member</option>
                            <option value="manager">Manager</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-building"></i> Department</label>
                        <input type="text" id="department" placeholder="e.g., Marketing, Sales">
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="password" placeholder="Create password" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                    </div>
                </div>
                <button type="submit" class="auth-btn">Register Account</button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script>
        const USERS_KEY = 'nagarik_crm_users';

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const role = document.getElementById('role').value;
            const department = document.getElementById('department').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showMessage('Passwords do not match!', 'error');
                return;
            }
            
            const users = JSON.parse(localStorage.getItem(USERS_KEY));
            if (users.find(u => u.email === email)) {
                showMessage('Email already registered!', 'error');
                return;
            }
            
            const newUser = {
                id: Date.now().toString(),
                fullName,
                email,
                password,
                role,
                department,
                status: 'active',
                createdAt: new Date().toISOString(),
                lastLogin: null
            };
            
            users.push(newUser);
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
            showMessage('Registration successful! Redirecting to login...', 'success');
            setTimeout(() => window.location.href = 'login.html', 2000);
        });
        
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
            setTimeout(() => msgDiv.className = 'message', 3000);
        }
    </script>
</body>
</html>
